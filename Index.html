if (!name || typeof name !== “string”) return null;
const key = Object.keys(EXERCISE_DB).find(k => k.toLowerCase() === name.toLowerCase());
return key ? EXERCISE_DB[key] : null;
}

// Plans: each plan owns its own workouts array

function loadPlansInit() {
try {
const s = localStorage.getItem(PLANS_KEY);
if (s) {
const p = JSON.parse(s);
if (p && p.length) return p;
}
// Migrate existing workouts into default plan
const ws = loadWorkouts();
return [{
id: “plan1”,
name: “My 7-Day Split”,
active: true,
createdAt: getTodayKey(),
workouts: ws
}];
} catch {
return [{
id: “plan1”,
name: “My 7-Day Split”,
active: true,
createdAt: getTodayKey(),
workouts: DEFAULT_WORKOUTS
}];
}
}

} catch {}
};

const getTodayKey = () => {
const d = new Date();
return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};
const rndId = () => Math.random().toString(36).slice(2, 8);
const getPrevLog = (logs, dayId, cur) => {
const s = `-${dayId}`;
const e = Object.entries(logs).filter(([k]) => k.endsWith(s) && k < `${cur}${s}`).sort(([a], [b]) => b.localeCompare(a));
return e[0]?.[1] ?? null;
};
const fmtDur = s => {
const h = Math.floor(s / 3600),
m = Math.floor(s % 3600 / 60),
ss = s % 60;
if (h > 0) return `${h}h ${m}m`;
if (m > 0) return `${m}m ${String(ss).padStart(2, "0")}s`;
return `${ss}s`;
};
const fmtTime = iso => {
if (!iso) return “”;
return new Date(iso).toLocaleTimeString([], {
hour: “2-digit”,
minute: “2-digit”
});
};

function build12WeekData(completedDates) {

const dow = today.getDay(),

const thisMonday = new Date(today);
thisMonday.setDate(thisMonday.getDate() - dfm);
const weeks = [];
for (let w = 0; w < 12; w++) {
const mon = new Date(thisMonday);
mon.setDate(mon.getDate() + w * 7);
const isCurrent = w === 0;
let count = 0;
for (let d = 0; d < 7; d++) {
const cur = new Date(mon);
cur.setDate(cur.getDate() + d);
const ds = localDateStr(cur);
if (ds > todayStr) break; // don’t count future days
if (completedDates.has(ds)) count++;
}
const isFuture = mon > today; // entire week is in future
weeks.push({
label: mon.toLocaleDateString([], {
month: “short”,
day: “numeric”
}),
count,
weekNum: w + 1,
isCurrent,
isFuture
});
}
return weeks;
}
